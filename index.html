<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祇園茶寮×タニタカフェ ららぽーと柏の葉店｜こころの健康、整える。</title>
<meta name="description" content="祇園茶寮×タニタカフェ ららぽーと柏の葉店。国産食材にこだわった栄養バランスの良い和定食と、宇治抹茶のスイーツをお届けします。ららぽーと柏の葉3階。">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  :root{
    --sumikon:#1E2B24;     /* 墨紺:ヒーロー・ヘッダー背景 */
    --sumikon-2:#28362E;
    --kinari:#F5F0E4;      /* 生成り:本文背景(和紙) */
    --kinari-2:#EFE8D6;
    --matcha:#5F7350;      /* 抹茶:メインアクセント */
    --matcha-d:#4A5C3E;
    --kin:#B08D3F;         /* 金:縁取り・アクセント */
    --shu:#9C4530;         /* 朱:落款・強調 */
    --sumi:#2B2621;        /* 墨:本文文字 */
    --sumi-soft:#5A5348;
    --line:rgba(43,38,33,0.14);
    --shadow:0 18px 40px rgba(30,43,36,0.14);
    --maxw:1140px;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }

  body{
    margin:0;
    background-color: var(--kinari);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    color:var(--sumi);
    font-family:'Noto Sans JP',sans-serif;
    line-height:1.85;
    -webkit-font-smoothing:antialiased;
  }

  h1,h2,h3{
    font-family:'Shippori Mincho',serif;
    color:var(--sumikon);
    margin:0;
    letter-spacing:.05em;
  }

  a{color:inherit; transition: opacity 0.2s;}
  a:hover { opacity: 0.8; }
  img{max-width:100%; display:block;}
  .container{max-width:var(--maxw); margin:0 auto; padding:0 28px;}
  section{position:relative;}

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:.6em;
    font-family:'DotGothic16',monospace;
    font-size:.78rem;
    letter-spacing:.22em;
    color:var(--kin);
  }
  .eyebrow::before{content:"";width:22px;height:1px;background:var(--kin);}

  .btn{
    display:inline-flex;
    align-items:center;
    gap:.5em;
    padding:.95em 1.9em;
    border-radius:4px;
    font-size:.92rem;
    letter-spacing:.08em;
    text-decoration:none;
    border:1px solid transparent;
    cursor:pointer;
    transition:transform .25s ease, background .25s ease, color .25s ease, box-shadow .25s ease;
  }
  .btn:focus-visible{outline:2px solid var(--kin); outline-offset:3px;}
  .btn-primary{background:var(--kin); color:var(--kinari); font-weight:700;}
  .btn-primary:hover{transform:translateY(-3px); background:#9f7c32; box-shadow: 0 6px 15px rgba(176,141,63,0.3); opacity: 1;}
  .btn-line{background:var(--kinari); color:var(--sumikon); border-color:var(--sumikon);}
  .btn-line:hover{transform:translateY(-3px); background:var(--sumikon); color:var(--kinari); box-shadow: 0 6px 15px rgba(30,43,36,0.2); opacity: 1;}
  .btn-ghost{background:transparent; color:var(--kinari); border-color:rgba(245,240,228,.5);}
  .btn-ghost:hover{border-color:var(--kin); color:var(--kin); background: rgba(245,240,228,0.1); opacity: 1;}

  /* ---------- Header ---------- */
  header{
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(30,43,36,0);
    transition:background .35s ease, box-shadow .35s ease, padding .35s ease;
    padding:22px 0;
  }
  header.is-scrolled{background:rgba(30,43,36,.96); box-shadow:0 8px 24px rgba(0,0,0,.25); padding:12px 0; backdrop-filter:blur(8px);}
  header .container{display:flex; align-items:center; justify-content:space-between;}
  .logo{color:var(--kinari); text-decoration:none; line-height:1.3;}
  .logo strong{display:block; font-family:'Shippori Mincho',serif; font-size:1.15rem; letter-spacing:.06em;}
  .logo span{display:block; font-family:'DotGothic16',monospace; font-size:.66rem; letter-spacing:.18em; color:var(--kin); margin-top:4px;}
  nav.main-nav{display:flex; align-items:center; gap:34px;}
  nav.main-nav a{color:var(--kinari); text-decoration:none; font-size:.88rem; letter-spacing:.05em; position:relative; padding-bottom:4px;}
  nav.main-nav a::after{content:"";position:absolute;left:0;bottom:0;width:0;height:1px;background:var(--kin);transition:width .3s ease;}
  nav.main-nav a:hover::after{width:100%;}
  .nav-tel{display:flex; align-items:center; gap:26px;}
